name: stationapi

services:
  api:
    build:
      context: .
      dockerfile: ./docker/api/Dockerfile.dev
    command: cargo watch -s "cargo run -p stationapi"
    depends_on:
      - db
    volumes:
      - .:/app
    environment:
      DATABASE_URL: postgres://stationapi:password@db/stationapi
      ACCEPT_HTTP1: true
      ENABLE_ALL_STATIONS_RPC: true
      HOST: 0.0.0.0
    ports:
      - 50051:50051
    networks:
      - sapi-link

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: stationapi
      POSTGRES_PASSWORD: password
      POSTGRES_DB: stationapi
    networks:
      - sapi-link

  # migration:
